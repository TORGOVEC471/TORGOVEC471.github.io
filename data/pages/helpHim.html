<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бишкек Солидарный — Карта</title>
    <link rel="icon" type="image/x-icon" href="../image/site/logo.svg">
    <link rel="stylesheet" href="../../style.css">
    <!-- Шрифты для текстов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
</head>
<body>
    <div class="one-block map-page">
        <!-- 1. Хедер с лого и кнопками -->
        <header class="header">
            <div class="name-logo">
                <div class="logo">
                    <a href="../../index.html">
                        <img src="../image/site/logo.svg" width=80px>
                    </a>
                </div><h1>Бишкек Солидарный</h1>
            </div>
            <nav class="nav-buttons">
                <a href="./helpMe.html" class="btn-yellow">
                    <div class="btn-image">
                        <img src="../image/site/solar_hand-top.svg" width=30px>
                        Нужна помощь
                    </div>
                </a>
                <a href="./helpHim.html" class="btn-yellow">
                    <div class="btn-image">
                        <img src="../image/site/solar_hand-bottom.svg" width=30px>
                        Карта
                    </div>
                </a>
                <a href="./about.html" class="btn-yellow">О нас</a>
            </nav>
        </header>
        <div id="map" style="height: 70%; width: 100%; border-radius: 20px; display: flex; align-items: center;"></div>
    </div>
    
    <!-- выпадающая форма -->
    <div id="form-container" class="form-container">
        <h3>Добавить помощь</h3>
        <label>Категория:</label><br>
        <select id="marker-category" onchange="toggleOtherInput()">
            <option value="Еда">Еда (Волонтерство)</option>
            <option value="Медицина">Медицина</option>
            <option value="Благотворительность">Благотворительность</option>
            <option value="Одежда">Одежда / Вещи</option>
            <option value="Приют">Приют</option>
            <option value="Экология">Экология</option>
            <option value="Другое">Другое</option>
        </select><br><br>

        <!-- Поле, которое появляется при выборе "Другое" -->
        <div id="other-category-container" style="display: none;">
            <label>Уточните категорию:</label><br>
            <input type="text" id="other-category-text" placeholder="Введите свою категорию"><br><br>
        </div>

        <label>Название:</label><br>
        <input type="text" placeholder="Название" id="marker-name"><br>
        <label>Описание:</label><br>
        <textarea id="marker-text" rows="3"></textarea><br><br>
        <button id="save-btn">Сохранить</button>
        <button onclick="document.getElementById('form-container').style.display='none'">Отмена</button>
    </div>

    <!-- <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script> -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    // Import the functions you need from the SDKs you need
    // Используем одну и ту же версию 10.8.0 везде
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
        apiKey: "AIzaSyAHH9_cw0IWOnjkTw-W59y15-pg3v0-JzU",
        authDomain: "bishkeksolid-db.firebaseapp.com",
        projectId: "bishkeksolid-db",
        storageBucket: "bishkeksolid-db.firebasestorage.app",
        messagingSenderId: "1001353097895",
        appId: "1:1001353097895:web:ec8ecbf5f80547ac2e2182",
        measurementId: "G-5WVG70BREF"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Сделаем базу данных доступной для других скриптов
    window.db = db;
    </script>
    <script type="module" src="../scripts/map_helper.js"></script>
</body>
</html>
